  portal.js: |
    (function () {
      const SITES = [
        { key: "site-a", endpoint: "/status/api/site-a/healthz" },
        { key: "site-b", endpoint: "/status/api/site-b/healthz" },
        { key: "site-c", endpoint: "/status/api/site-c/healthz" },
        { key: "site-d", endpoint: "/status/api/site-d/healthz" }
      ];
      const CLOCK_INTERVAL_MS = 15000;
      const HEALTH_INTERVAL_MS = 20000;

      function classifyProbe(result) {
        if (!result.ok) {
          return "red";
        }
        if (result.status >= 500) {
          return "red";
        }
        if (result.status >= 400 || result.latency_ms > 1800) {
          return "amber";
        }
        return "green";
      }

      async function probe(url) {
        const started = performance.now();
        try {
          const res = await fetch(url, { cache: "no-store" });
          return {
            ok: true,
            status: res.status,
            latency_ms: Math.round(performance.now() - started)
          };
        } catch (err) {
          return {
            ok: false,
            status: 0,
            latency_ms: Math.round(performance.now() - started),
            error: err && err.message ? err.message : "request failed"
          };
        }
      }

      function updateClock() {
        const el = document.getElementById("portal-time");
        if (!el) {
          return;
        }
        el.textContent = "Updated " + new Date().toLocaleString();
      }

      function updateCard(siteKey, probeResult) {
        const card = document.querySelector('[data-site="' + siteKey + '"]');
        if (!card) {
          return;
        }
        const state = classifyProbe(probeResult);
        card.dataset.state = state;

        const dot = card.querySelector(".dot");
        if (dot) {
          dot.className = "dot " + state;
        }

        const text = card.querySelector(".status-summary");
        if (!text) {
          return;
        }

        if (state === "green") {
          text.textContent = "Alive \u2022 HTTP " + probeResult.status + " \u2022 " + probeResult.latency_ms + "ms";
          return;
        }

        if (state === "amber") {
          text.textContent = "Distress \u2022 HTTP " + probeResult.status + " \u2022 " + probeResult.latency_ms + "ms";
          return;
        }

        const detail = probeResult.status > 0 ? "HTTP " + probeResult.status : (probeResult.error || "unreachable");
        text.textContent = "Failing \u2022 " + detail;
      }

      async function refreshHealth() {
        const results = await Promise.all(
          SITES.map(async function (site) {
            const probeResult = await probe(site.endpoint);
            return { key: site.key, probe: probeResult };
          })
        );

        results.forEach(function (result) {
          updateCard(result.key, result.probe);
        });
      }

      updateClock();
      refreshHealth();
      setInterval(updateClock, CLOCK_INTERVAL_MS);
      setInterval(refreshHealth, HEALTH_INTERVAL_MS);
    }());
