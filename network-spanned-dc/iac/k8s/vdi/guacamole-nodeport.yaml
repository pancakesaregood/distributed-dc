  status.js: |
    (function () {
      const REFRESH_MS = 30000;
      const SITES = [
        {
          id: "site-a",
          label: "Site A",
          checks: [
            { label: "Published /healthz", endpoint: "/status/api/site-a/healthz" },
            { label: "Guacamole /guacamole/", endpoint: "/status/api/site-a/guacamole" }
          ]
        },
        {
          id: "site-b",
          label: "Site B",
          checks: [
            { label: "Published /healthz", endpoint: "/status/api/site-b/healthz" },
            { label: "Guacamole /guacamole/", endpoint: "/status/api/site-b/guacamole" }
          ]
        },
        {
          id: "site-c",
          label: "Site C",
          checks: [
            { label: "Published /healthz", endpoint: "/status/api/site-c/healthz" },
            { label: "Guacamole /guacamole/", endpoint: "/status/api/site-c/guacamole" }
          ]
        },
        {
          id: "site-d",
          label: "Site D",
          checks: [
            { label: "Published /healthz", endpoint: "/status/api/site-d/healthz" },
            { label: "Guacamole /guacamole/", endpoint: "/status/api/site-d/guacamole" }
          ]
        }
      ];

      function classifyProbe(result) {
        if (!result.ok) {
          return "red";
        }
        if (result.status >= 500) {
          return "red";
        }
        if (result.status >= 400 || result.latency_ms > 1800) {
          return "amber";
        }
        return "green";
      }

      function classifyCollection(states) {
        if (states.some(function (s) { return s === "red"; })) {
          return "red";
        }
        if (states.some(function (s) { return s === "amber"; })) {
          return "amber";
        }
        return "green";
      }

      async function probe(endpoint) {
        const started = performance.now();
        try {
          const response = await fetch(endpoint, { cache: "no-store" });
          return {
            ok: true,
            status: response.status,
            latency_ms: Math.round(performance.now() - started)
          };
        } catch (err) {
          return {
            ok: false,
            status: 0,
            latency_ms: Math.round(performance.now() - started),
            error: err && err.message ? err.message : "request failed"
          };
        }
      }

      function checkSummary(state, result) {
        if (state === "green") {
          return "alive \u2022 HTTP " + result.status + " \u2022 " + result.latency_ms + "ms";
        }
        if (state === "amber") {
          return "distress \u2022 HTTP " + result.status + " \u2022 " + result.latency_ms + "ms";
        }
        const detail = result.status > 0 ? "HTTP " + result.status : (result.error || "unreachable");
        return "failing \u2022 " + detail;
      }

      function renderSite(site, checks) {
        const states = checks.map(function (check) { return check.state; });
        const siteState = classifyCollection(states);

        const list = checks.map(function (check) {
          return (
            '<li class="check-item">' +
              '<span class="check-item-name"><span class="dot ' + check.state + '" aria-hidden="true"></span> ' + check.label + "</span>" +
              '<span class="check-item-state">' + checkSummary(check.state, check.result) + "</span>" +
            "</li>"
          );
        }).join("");

        return (
          '<article class="status-site" data-state="' + siteState + '">' +
            '<div class="status-site-head">' +
              "<h3>" + site.label + "</h3>" +
              '<span class="dot ' + siteState + '" aria-hidden="true"></span>' +
            "</div>" +
            '<ul class="check-list">' + list + "</ul>" +
          "</article>"
        );
      }

      function renderOverall(siteStates) {
        const state = classifyCollection(siteStates);
        const light = document.getElementById("overall-light");
        const text = document.getElementById("overall-text");
        const stamp = document.getElementById("status-time");

        if (light) {
          light.className = "dot " + state;
        }
        if (text) {
          if (state === "green") {
            text.textContent = "Overall state: ALIVE";
          } else if (state === "amber") {
            text.textContent = "Overall state: DISTRESS";
          } else {
            text.textContent = "Overall state: FAILING";
          }
        }
        if (stamp) {
          stamp.textContent = "Updated " + new Date().toLocaleString();
        }
      }

      async function refresh() {
        const siteCards = await Promise.all(
          SITES.map(async function (site) {
            const checks = await Promise.all(
              site.checks.map(async function (check) {
                const result = await probe(check.endpoint);
                return {
                  label: check.label,
                  result: result,
                  state: classifyProbe(result)
                };
              })
            );
            return {
              site: site,
              checks: checks,
              state: classifyCollection(checks.map(function (check) { return check.state; }))
            };
          })
        );

        const grid = document.getElementById("status-grid");
        if (grid) {
          grid.innerHTML = siteCards.map(function (siteCard) {
            return renderSite(siteCard.site, siteCard.checks);
          }).join("");
        }
        renderOverall(siteCards.map(function (siteCard) { return siteCard.state; }));
      }

      refresh();
      setInterval(refresh, REFRESH_MS);
    }());
