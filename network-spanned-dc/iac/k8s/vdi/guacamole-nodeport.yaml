apiVersion: v1
kind: ConfigMap
metadata:
  name: vdi-portal-nginx
  namespace: vdi
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
    }

    # First IP from incoming X-Forwarded-For chain (if present).
    map $http_x_forwarded_for $incoming_forwarded_first_ip {
      ~^(?<first>[^,]+) $first;
      default            "";
    }

    # Prefer Cloudflare's original client IP; then incoming X-Real-IP; then XFF first hop.
    map $http_cf_connecting_ip $client_real_ip_source_cf {
      default $http_cf_connecting_ip;
      ''      $http_x_real_ip;
    }

    map $client_real_ip_source_cf $client_real_ip_source_hdr {
      default $client_real_ip_source_cf;
      ''      $incoming_forwarded_first_ip;
    }

    map $client_real_ip_source_hdr $client_real_ip_effective {
      default $client_real_ip_source_hdr;
      ''      $remote_addr;
    }

    log_format vdi_main '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" xff="$http_x_forwarded_for" '
                        'xri="$http_x_real_ip" cfip="$http_cf_connecting_ip" effective="$client_real_ip_effective"';

    server {
      listen 8081;
      server_name _;
      resolver kube-dns.kube-system.svc.cluster.local ipv6=off valid=30s;
      access_log /dev/stdout vdi_main;

      root /etc/vdi-portal;
      index index.html;

      location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
      }

      location = / {
        try_files /index.html =404;
      }

      location /portal/ {
        alias /etc/vdi-portal/;
        try_files $uri =404;
        add_header Cache-Control "no-store";
      }

      location = /status {
        return 302 /status/;
      }

      location /status/ {
        try_files /status.html =404;
        add_header Cache-Control "no-store";
      }

      location = /status/api/site-a/healthz {
        proxy_pass http://127.0.0.1:8081/healthz;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        proxy_send_timeout 3s;
        add_header Cache-Control "no-store";
      }

      location = /status/api/site-a/guacamole {
        proxy_pass http://127.0.0.1:8080/guacamole/;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        proxy_send_timeout 3s;
        add_header Cache-Control "no-store";
      }

      location = /status/api/site-b/healthz {
        set $status_probe_url https://app-b.slothkko.com/healthz;
        proxy_pass $status_probe_url;
        proxy_set_header Host app-b.slothkko.com;
        proxy_ssl_server_name on;
        proxy_ssl_name app-b.slothkko.com;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        proxy_send_timeout 3s;
        add_header Cache-Control "no-store";
      }

      location = /status/api/site-b/guacamole {
        set $status_probe_url https://app-b.slothkko.com/guacamole/;
        proxy_pass $status_probe_url;
        proxy_set_header Host app-b.slothkko.com;
        proxy_ssl_server_name on;
        proxy_ssl_name app-b.slothkko.com;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        proxy_send_timeout 3s;
        add_header Cache-Control "no-store";
      }

      location = /status/api/site-c/healthz {
        set $status_probe_url https://app-c.slothkko.com/healthz;
        proxy_pass $status_probe_url;
        proxy_set_header Host app-c.slothkko.com;
        proxy_ssl_server_name on;
        proxy_ssl_name app-c.slothkko.com;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        proxy_send_timeout 3s;
        add_header Cache-Control "no-store";
      }

      location = /status/api/site-c/guacamole {
        set $status_probe_url https://app-c.slothkko.com/guacamole/;
        proxy_pass $status_probe_url;
        proxy_set_header Host app-c.slothkko.com;
        proxy_ssl_server_name on;
        proxy_ssl_name app-c.slothkko.com;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        proxy_send_timeout 3s;
        add_header Cache-Control "no-store";
      }

      location = /status/api/site-d/healthz {
        set $status_probe_url https://app-d.slothkko.com/healthz;
        proxy_pass $status_probe_url;
        proxy_set_header Host app-d.slothkko.com;
        proxy_ssl_server_name on;
        proxy_ssl_name app-d.slothkko.com;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        proxy_send_timeout 3s;
        add_header Cache-Control "no-store";
      }

      location = /status/api/site-d/guacamole {
        set $status_probe_url https://app-d.slothkko.com/guacamole/;
        proxy_pass $status_probe_url;
        proxy_set_header Host app-d.slothkko.com;
        proxy_ssl_server_name on;
        proxy_ssl_name app-d.slothkko.com;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        proxy_send_timeout 3s;
        add_header Cache-Control "no-store";
      }

      location = /guacamole {
        return 302 /guacamole/;
      }

      location = /idp {
        return 302 /idp/;
      }

      location /idp/ {
        proxy_pass http://keycloak.vdi.svc.cluster.local:8080/idp/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $client_real_ip_effective;
        proxy_set_header X-Real-IP $client_real_ip_effective;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
      }

      location /guacamole/ {
        proxy_pass http://127.0.0.1:8080/guacamole/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $client_real_ip_effective;
        proxy_set_header X-Real-IP $client_real_ip_effective;
        proxy_set_header X-Original-Forwarded-For $http_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Accept-Encoding "";

        proxy_buffering off;
        proxy_set_header If-None-Match "";
        proxy_set_header If-Modified-Since "";
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        sub_filter '</head>' '<link rel="stylesheet" href="/portal/guac-theme.css?v=20260309r2"><script src="/portal/guac-branding.js?v=20260309r2"></script></head>';
        sub_filter_types text/html;
        sub_filter_once on;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: guacamole-db
  namespace: vdi
  labels:
    app.kubernetes.io/name: guacamole-db
    app.kubernetes.io/part-of: vdi
spec:
  selector:
    app.kubernetes.io/name: guacamole-db
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacamole-db
  namespace: vdi
  labels:
    app.kubernetes.io/name: guacamole-db
    app.kubernetes.io/part-of: vdi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: guacamole-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guacamole-db
        app.kubernetes.io/part-of: vdi
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        workload: vdi
      tolerations:
      - key: workload
        operator: Equal
        value: vdi
        effect: NoSchedule
      containers:
      - name: postgres
        image: __POSTGRES_IMAGE__
        imagePullPolicy: IfNotPresent
        ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: guacamole-db-auth
              key: database
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: guacamole-db-auth
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: guacamole-db-auth
              key: password
        readinessProbe:
          tcpSocket:
            port: postgres
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
        livenessProbe:
          tcpSocket:
            port: postgres
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 6
        resources:
          requests:
            cpu: 150m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
        - name: db-init
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: db-data
        emptyDir: {}
      - name: db-init
        configMap:
          name: guacamole-db-init
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-auth
  namespace: vdi
type: Opaque
stringData:
  admin_username: "__KEYCLOAK_ADMIN_USERNAME__"
  admin_password: "__KEYCLOAK_ADMIN_PASSWORD__"
  bootstrap_username: "__KEYCLOAK_BOOTSTRAP_USERNAME__"
  bootstrap_password: "__KEYCLOAK_BOOTSTRAP_PASSWORD__"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  namespace: vdi
data:
  vdi-realm.json: |
    {
      "realm": "vdi",
      "enabled": true,
      "displayName": "Slothkko Access",
      "registrationAllowed": false,
      "registrationEmailAsUsername": false,
      "rememberMe": false,
      "verifyEmail": false,
      "loginWithEmailAllowed": false,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "sslRequired": "external",
      "webAuthnPolicyRpEntityName": "slothkko access",
      "webAuthnPolicyPasswordlessRpEntityName": "slothkko access",
      "webAuthnPolicyPasswordlessRpId": "slothkko.com",
      "webAuthnPolicyPasswordlessSignatureAlgorithms": [
        "ES256",
        "RS256"
      ],
      "webAuthnPolicyPasswordlessAuthenticatorAttachment": "cross-platform",
      "webAuthnPolicyPasswordlessAvoidSameAuthenticatorRegister": true,
      "webAuthnPolicyPasswordlessCreateTimeout": 120,
      "webAuthnPolicyPasswordlessRequireResidentKey": "Yes",
      "webAuthnPolicyPasswordlessUserVerificationRequirement": "required",
      "clients": [
        {
          "clientId": "guacamole",
          "name": "Guacamole VDI",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "implicitFlowEnabled": true,
          "serviceAccountsEnabled": false,
          "attributes": {
            "pkce.code.challenge.method": "S256",
            "post.logout.redirect.uris": "+"
          },
          "redirectUris": [
            "https://slothkko.com/guacamole/*",
            "https://app-a.slothkko.com/guacamole/*"
          ],
          "webOrigins": [
            "https://slothkko.com",
            "https://app-a.slothkko.com"
          ],
          "defaultClientScopes": [
            "profile",
            "email",
            "roles"
          ],
          "optionalClientScopes": [
            "web-origins"
          ]
        }
      ],
      "users": [
        {
          "username": "__KEYCLOAK_BOOTSTRAP_USERNAME__",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "temporary": true,
              "value": "__KEYCLOAK_BOOTSTRAP_PASSWORD__"
            }
          ],
          "requiredActions": [
            "webauthn-register-passwordless"
          ]
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: vdi
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: vdi
spec:
  selector:
    app.kubernetes.io/name: keycloak
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: vdi
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: vdi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/part-of: vdi
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        workload: vdi
      tolerations:
      - key: workload
        operator: Equal
        value: vdi
        effect: NoSchedule
      containers:
      - name: keycloak
        image: __KEYCLOAK_IMAGE__
        imagePullPolicy: IfNotPresent
        args:
        - start-dev
        - --import-realm
        - --proxy-headers=xforwarded
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        env:
        - name: KC_BOOTSTRAP_ADMIN_USERNAME
          valueFrom:
            secretKeyRef:
              name: keycloak-auth
              key: admin_username
        - name: KC_BOOTSTRAP_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-auth
              key: admin_password
        - name: KC_DB
          value: postgres
        - name: KC_DB_URL_HOST
          value: guacamole-db.vdi.svc.cluster.local
        - name: KC_DB_URL_PORT
          value: "5432"
        - name: KC_DB_URL_DATABASE
          valueFrom:
            secretKeyRef:
              name: guacamole-db-auth
              key: database
        - name: KC_DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: guacamole-db-auth
              key: username
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: guacamole-db-auth
              key: password
        - name: KC_DB_SCHEMA
          value: keycloak
        - name: KC_HTTP_RELATIVE_PATH
          value: /idp
        - name: KC_HOSTNAME
          value: slothkko.com
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_PROXY_HEADERS
          value: xforwarded
        - name: KC_HEALTH_ENABLED
          value: "true"
        - name: KC_METRICS_ENABLED
          value: "true"
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 90
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        resources:
          requests:
            cpu: 100m
            memory: 384Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
        volumeMounts:
        - name: keycloak-realm-import
          mountPath: /opt/keycloak/data/import
          readOnly: true
      volumes:
      - name: keycloak-realm-import
        configMap:
          name: keycloak-realm-import
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacamole
  namespace: vdi
  labels:
    app.kubernetes.io/name: guacamole
    app.kubernetes.io/part-of: vdi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: guacamole
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guacamole
        app.kubernetes.io/part-of: vdi
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        workload: vdi
      tolerations:
      - key: workload
        operator: Equal
        value: vdi
        effect: NoSchedule
      containers:
      - name: guacd
        image: __GUACD_IMAGE__
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        ports:
        - name: guacd
          containerPort: 4822
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 512Mi
      - name: guacamole
        image: __GUACAMOLE_IMAGE__
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        env:
        - name: GUACD_HOSTNAME
          value: "127.0.0.1"
        - name: GUACD_PORT
          value: "4822"
        - name: REMOTE_IP_VALVE_ENABLED
          value: "true"
        - name: PROXY_IP_HEADER
          value: "X-Real-IP"
        - name: PROXY_PROTOCOL_HEADER
          value: "X-Forwarded-Proto"
        - name: PROXY_ALLOWED_IPS_REGEX
          value: '127\.0\.0\.1|::1|10\..*|192\.168\..*|172\.(1[6-9]|2[0-9]|3[0-1])\..*'
        - name: POSTGRESQL_HOSTNAME
          value: "guacamole-db.vdi.svc.cluster.local"
        - name: POSTGRESQL_PORT
          value: "5432"
        - name: POSTGRESQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: guacamole-db-auth
              key: database
        - name: POSTGRESQL_USER
          valueFrom:
            secretKeyRef:
              name: guacamole-db-auth
              key: username
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: guacamole-db-auth
              key: password
        - name: OPENID_AUTHORIZATION_ENDPOINT
          value: "https://slothkko.com/idp/realms/vdi/protocol/openid-connect/auth"
        - name: OPENID_JWKS_ENDPOINT
          value: "http://keycloak.vdi.svc.cluster.local:8080/idp/realms/vdi/protocol/openid-connect/certs"
        - name: OPENID_ISSUER
          value: "https://slothkko.com/idp/realms/vdi"
        - name: OPENID_CLIENT_ID
          value: "guacamole"
        - name: OPENID_REDIRECT_URI
          value: "https://slothkko.com/guacamole/"
        - name: OPENID_USERNAME_CLAIM_TYPE
          value: "preferred_username"
        - name: OPENID_GROUPS_CLAIM_TYPE
          value: "groups"
        - name: OPENID_MAX_TOKEN_VALIDITY
          value: "30"
        - name: EXTENSION_PRIORITY
          value: "openid,postgresql"
        ports:
        - name: guac-http
          containerPort: 8080
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /guacamole/
            port: guac-http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /guacamole/
            port: guac-http
          initialDelaySeconds: 90
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1536Mi
      - name: portal-proxy
        image: __NGINX_IMAGE__
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8081
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 6
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 300m
            memory: 256Mi
        volumeMounts:
        - name: portal-assets
          mountPath: /etc/vdi-portal
          readOnly: true
        - name: portal-nginx
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
          readOnly: true
      volumes:
      - name: portal-assets
        configMap:
          name: vdi-portal-assets
      - name: portal-nginx
        configMap:
          name: vdi-portal-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: guacamole-nodeport
  namespace: vdi
  labels:
    app.kubernetes.io/name: guacamole
    app.kubernetes.io/part-of: vdi
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: guacamole
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: http
    nodePort: 30080
