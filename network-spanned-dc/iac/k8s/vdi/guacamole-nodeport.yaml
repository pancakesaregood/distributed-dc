    }
  guac-branding.js: |
    (function () {
      var brandTitle = "Slothkko Access";

      function applyBranding() {
        try {
        if (document.title !== brandTitle) {
          document.title = brandTitle;
        }

          var icon = "/portal/sloth-smile.svg";
          var links = document.querySelectorAll("link[rel='icon'], link[rel='apple-touch-icon']");
          for (var i = 0; i < links.length; i++) {
            links[i].href = icon;
          }

          var labels = document.querySelectorAll(".version .app-name");
          for (var j = 0; j < labels.length; j++) {
            labels[j].textContent = "SLOTHKKO ACCESS";
          }
        } catch (e) {
          // Keep Guacamole bootstrap resilient even if branding fails.
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", applyBranding, { once: true });
      }

      applyBranding();
      setTimeout(applyBranding, 800);
    }());
  sloth-smile.svg: |
