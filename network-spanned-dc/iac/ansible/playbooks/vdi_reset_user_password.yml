---
- name: Reset VDI user password
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    kube_namespace: "vdi"
    keycloak_realm: "vdi"
    keycloak_admin_secret_name: "keycloak-auth"
    vdi_password_temporary: false

  pre_tasks:
    - name: Assert required inputs
      ansible.builtin.assert:
        that:
          - vdi_username is defined
          - vdi_username | length > 0
          - vdi_username is match('^[A-Za-z0-9._-]{3,64}$')
          - vdi_user_password is defined
          - vdi_user_password | length > 0
        fail_msg: "Provide vdi_username and vdi_user_password."

  tasks:
    - name: Get Keycloak pod
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - pod
          - -n
          - "{{ kube_namespace }}"
          - -l
          - app.kubernetes.io/name=keycloak
          - -o
          - jsonpath={.items[0].metadata.name}
      register: keycloak_pod
      changed_when: false

    - name: Get Keycloak admin secret (username:password b64)
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - secret
          - -n
          - "{{ kube_namespace }}"
          - "{{ keycloak_admin_secret_name }}"
          - -o
          - jsonpath={.data.admin_username}:{.data.admin_password}
      register: keycloak_admin_b64
      changed_when: false
      no_log: true

    - name: Decode Keycloak admin credentials
      ansible.builtin.set_fact:
        keycloak_admin_username: "{{ (keycloak_admin_b64.stdout.split(':')[0]) | b64decode }}"
        keycloak_admin_password: "{{ (keycloak_admin_b64.stdout.split(':')[1]) | b64decode }}"
      no_log: true

    - name: Assert user exists in Keycloak realm
      ansible.builtin.command:
        argv:
          - kubectl
          - exec
          - -n
          - "{{ kube_namespace }}"
          - "{{ keycloak_pod.stdout }}"
          - --
          - /bin/sh
          - -lc
          - >
            /opt/keycloak/bin/kcadm.sh config credentials --server http://127.0.0.1:8080/idp --realm master --user '{{ keycloak_admin_username }}' --password '{{ keycloak_admin_password }}' &&
            /opt/keycloak/bin/kcadm.sh get users -r {{ keycloak_realm }} -q username='{{ vdi_username }}' --fields id --format csv --noquotes | tail -n 1
      register: keycloak_user_id
      changed_when: false
      no_log: true

    - name: Fail when Keycloak user does not exist
      ansible.builtin.assert:
        that:
          - keycloak_user_id.stdout | trim | length > 0
        fail_msg: "User '{{ vdi_username }}' was not found in Keycloak realm '{{ keycloak_realm }}'."

    - name: Reset Keycloak user password
      ansible.builtin.command:
        argv:
          - kubectl
          - exec
          - -n
          - "{{ kube_namespace }}"
          - "{{ keycloak_pod.stdout }}"
          - --
          - /bin/sh
          - -lc
          - >
            /opt/keycloak/bin/kcadm.sh config credentials --server http://127.0.0.1:8080/idp --realm master --user '{{ keycloak_admin_username }}' --password '{{ keycloak_admin_password }}' &&
            /opt/keycloak/bin/kcadm.sh set-password -r {{ keycloak_realm }} --username '{{ vdi_username }}' --new-password '{{ vdi_user_password }}' {{ '--temporary' if (vdi_password_temporary | bool) else '' }}
      register: keycloak_password_reset
      changed_when: true
      no_log: true

    - name: Print password reset summary
      ansible.builtin.debug:
        msg:
          - "Reset password for VDI user: {{ vdi_username }}"
          - "Realm: {{ keycloak_realm }}"
          - "Temporary password: {{ vdi_password_temporary | bool }}"
